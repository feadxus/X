name: Free Up Disk Space

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 代码库
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Docker 环境
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 3. 安装 gzip
      - name: Install gzip
        run: |
          sudo apt update
          sudo apt install -y gzip

      # 4. 安装 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 5. 配置 rclone
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          cp rclone.conf ~/.config/rclone/

      # 6. 调试 rclone 配置
      - name: Debug rclone config
        run: cat ~/.config/rclone/rclone.conf

      # 7. 查看清理前磁盘空间
      - name: 查看清理前磁盘空间
        run: df -h /

      # 8. 拉取 Docker 镜像
      - name: Pull Docker image
        run: |
          docker pull leask/tabminal

      # 9. 保存 Docker 镜像为 tar 文件
      - name: Save Docker image to tar
        run: |
          docker save leask/tabminal -o tabminal_image.tar

      # 10. 压缩 Docker 镜像文件
      - name: Compress Docker image
        run: |
          gzip tabminal_image.tar

      # 11. 上传压缩包到 Google Drive
      - name: Upload to Google Drive
        run: |
          # 创建目录（如果已经存在不会报错）
          rclone mkdir Google:/backup || true
          # 上传压缩包
          rclone copy tabminal_image.tar.gz Google:/backup/
          # 查看上传结果
          rclone lsf Google:/backup/
