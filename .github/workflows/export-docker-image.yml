name: Free Up Disk Space - Download & Upload Armbian to Google Drive

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 代码库（如果你需要放 rclone.conf 在仓库里）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 3. 配置 rclone（假设你把 rclone.conf 放在仓库根目录）
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          cp rclone.conf ~/.config/rclone/rclone.conf

      # 4. 查看清理前磁盘空间
      - name: 查看清理前磁盘空间
        run: df -h /

      # 5. 下载 Armbian Orange Pi Zero 2W Trixie Minimal（自动跟随重定向）
      - name: Download Armbian Trixie Minimal
        run: |
          wget -O Armbian_Trixie_Orangepizero2w_minimal.img.xz \
            https://dl.armbian.com/orangepizero2w/Trixie_current_minimal

          # 可选：同时下载校验文件
          wget -O Armbian_Trixie_Orangepizero2w_minimal.img.xz.sha \
            https://dl.armbian.com/orangepizero2w/Trixie_current_minimal.sha
          
          echo "下载完成，文件信息："
          ls -lh Armbian_Trixie_Orangepizero2w_minimal.img.xz*

      # 6. 上传到 Google Drive（直接上传 img.xz 文件，不需要再 tar 压缩）
      - name: Upload to Google Drive
        run: |
          # 创建备份目录（如果不存在）
          rclone mkdir Google:/Armbian_Backup || true
          
          # 上传镜像文件
          rclone copy Armbian_Trixie_Orangepizero2w_minimal.img.xz Google:/Armbian_Backup/ --progress
          
          # 上传校验文件（推荐）
          rclone copy Armbian_Trixie_Orangepizero2w_minimal.img.xz.sha Google:/Armbian_Backup/ --progress
          
          # 查看上传后的文件列表
          echo "上传完成，Google Drive 中的文件："
          rclone lsf Google:/Armbian_Backup/

      # 7. 查看清理后磁盘空间（确认是否释放了空间）
      - name: 查看清理后磁盘空间
        run: df -h /
