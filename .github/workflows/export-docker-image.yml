name: Pack and Upload node_modules to Google Drive

on:
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出仓库中的配置文件（rclone.conf, package.json 等）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 rclone 工具
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 3. 部署 rclone 授权凭证
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          cp rclone.conf ~/.config/rclone/rclone.conf

      # 4. 配置纯净的 Node.js 20 环境（匹配你容器的版本）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 5. 微软海外纯净大宽带秒速安装依赖
      - name: Install dependencies via npm ci
        run: |
          npm ci

      # 6. 把下载好的 node_modules 文件夹原地打包（防丢、防损坏）
      - name: Zip node_modules
        run: |
          tar -czf node_modules.tar.gz node_modules
          echo "压缩完成，文件大小如下："
          ls -lh node_modules.tar.gz

      # 7. 通过 rclone 强行推送到你的 Google Drive
      - name: Upload to Google Drive
        run: |
          # 创建存放备份的目录
          rclone mkdir Google:/Node_Deps_Backup || true
          
          # 搬运压缩包到网盘
          rclone copy node_modules.tar.gz Google:/Node_Deps_Backup/ --progress
          
          # 打印网盘里的文件列表，确认安全送达
          echo "✅ 搬运成功！网盘文件清单："
          rclone lsf Google:/Node_Deps_Backup/
