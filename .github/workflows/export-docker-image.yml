name: Free Up Disk Space

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 代码库
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Docker 环境
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 3. 安装 gzip
      - name: Pull gzip
        run: |
          sudo apt update
          sudo apt install -y gzip

      # 4. 安装 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 5. 配置 rclone
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          cp rclone.conf ~/.config/rclone/

      # 6. 调试 rclone 配置
      - name: Debug rclone config
        run: cat ~/.config/rclone/rclone.conf

      # 7. 查看清理前磁盘空间
      - name: 查看清理前磁盘空间
        run: df -h /

      # 9. 下载指定文件
      - name: Download file
        run: |
          wget -O myfile.txt "https://pub-api-1.bianyuan.xyz/sub?target=clash&url=https%3A%2F%2Fraw.githubusercontent.com%2Febrasha%2Ffree-v2ray-public-list%2Frefs%2Fheads%2Fmain%2Fall_extracted_configs.txt&insert=false&config=https%3A%2F%2Fraw.githubusercontent.com%2FACL4SSR%2FACL4SSR%2Fmaster%2FClash%2Fconfig%2FACL4SSR_Online.ini&emoji=true&list=false&tfo=false&scv=true&fdn=false&expand=true&sort=false&new_name=true"
          ls -lh myfile.txt  # 查看下载文件的大小

      # 10. 上传文件到 Google Drive
      - name: Upload file to Google Drive
        run: |
          # 可选创建目录
          rclone mkdir Google:/backup || true
          # 上传文件
          rclone copy myfile.txt Google:/backup/
          # 查看上传结果
          rclone lsf Google:/backup/
