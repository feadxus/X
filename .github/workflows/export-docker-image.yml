name: Download and Backup Script

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装工具
      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y curl tar

      # 3. 安装 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 4. 配置 rclone
      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          if [ -f rclone.conf ]; then
            cp rclone.conf ~/.config/rclone/
          else
            echo "Error: rclone.conf not found!"
            exit 1
          fi

      # 5. 下载 .deb 文件
      - name: Download Chromium .deb
        run: |
          FILE_URL="https://github.com/clickot/ungoogled-chromium-binaries/releases/download/100.0.4896.127-1/ungoogled-chromium-common-dbgsym_100.0.4896.127-1.unportable1_amd64.deb"
          
          curl -L --fail "$FILE_URL" -o chromium.deb

          if [ ! -s chromium.deb ]; then
            echo "Download failed!"
            exit 1
          fi

          echo "Download successful!"

      # 6. （可选）压缩
      - name: Compress file
        run: |
          tar -czvf chromium-backup.tar.gz chromium.deb

      # 7. 上传到 Google Drive
      - name: Upload to Google Drive
        run: |
          rclone mkdir Google:/backup || true
          rclone copy chromium-backup.tar.gz Google:/backup/
          rclone lsf Google:/backup/
