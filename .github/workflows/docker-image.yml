name: Clone ODM Dataset to Google Drive

on:
  workflow_dispatch:

jobs:
  clone-and-upload:
    runs-on: ubuntu-latest
    steps:
      # ====================================================================
      # 腾出空间! 清理不需要的系统残留，为 2.5GB 仓库的拉取和重压留出充足硬空间
      # ====================================================================
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      # 📡 搬运工上岗: 使用 Ubuntu 自带包管理器一键安装 rclone
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      # 🔑 注入网盘钥匙: 把 Google Drive 凭证写入 rclone 配置文件
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 📥 降维打击：直接用 GitHub 官方动作把整个 2.5GB 的数据集仓库完整拉取下来
      - name: Checkout Target Dataset Repository
        uses: actions/checkout@v4
        with:
          repository: 'OpenDroneMap/odm_data_helenenschacht'
          path: 'helenenschacht_dataset' # 下载到这个临时文件夹

      # 🗜️ 强力打包并用 XZ 进行高比例极限压缩
      - name: Compress Dataset to XZ
        run: |
          echo "正在将整盘端下来的数据集打包，并用 XZ 进行强力瘦身..."
          # 打包文件夹，排除掉自带的 .git 隐藏目录（能进一步缩小体积）
          tar --exclude='.git' -cf - helenenschacht_dataset | xz -T0 -3 > odm_data_helenenschacht.tar.xz
          
          # 随手清理原始文件夹，释放磁盘，保持运行环境干净
          rm -rf ./helenenschacht_dataset

      # 📂 创建网盘远程备份据点
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          echo "开始上传到 Google 网盘..."
          rclone copy \
            odm_data_helenenschacht.tar.xz \
            feadxus-Google-Drive:/backup/

      # 🏁 终审盘点
      - name: Verify Upload
        run: |
          echo "网盘备份目录盘点："
          rclone lsf feadxus-Google-Drive:/backup/
