name: Free Up Disk Space & Fetch My Own Model

on:
  workflow_dispatch: # 支持手动一键触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 既然要调用自建模型，我们需要装回推理环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Roboflow Inference
        run: |
          pip install inference pillow requests

      # 2. 模拟运行：通过给它一张图强制它把几百兆的模型权重完全拉到 GitHub 云端
      - name: Force Download & Deep Scan Cache Location
        run: |
          echo "📡 正在启动 Mock 推理..."
          
          cat << 'EOF' > run_mock_inference.py
          import os
          from inference import get_model
          from PIL import Image
          
          model_id = "thermal-dataset-tfoku-nvsac/1" 
          api_key = "aVmJSznSNAgC4M05gyJf"
          
          print(f"🚀 开始拉取模型: {model_id} ...")
          try:
              model = get_model(model_id=model_id, api_key=api_key)
              mock_image = Image.new("RGB", (640, 640), (0, 0, 0))
              results = model.infer(mock_image)
              print("✅ 模拟推理圆满成功！")
          except Exception as e:
              print(f"❌ 运行失败: {e}")
              raise e
          EOF
          
          # 运行下载
          python run_mock_inference.py
          
          echo "=================================================="
          echo "🔍 寻宝开始：正在全盘搜索 Roboflow 的真正下载位置..."
          echo "=================================================="
          
          # 创建一个真正用来汇总模型的干净目录
          mkdir -p ${{ github.workspace }}/real_model_out
          
          # 1. 查找家目录下所有和 roboflow 或 inference 相关的隐藏文件夹
          echo "📁 检查 ~/.cache 或 ~/.config 目录下是否有货："
          find ~/.cache ~/.config ~/ -maxdepth 3 -name "*roboflow*" -o -name "*inference*" 2>/dev/null || true
          
          # 2. 【大招】直接全盘搜索大于 10MB 且最近 10 分钟内被修改/创建的文件
          echo "⚡ 全盘搜索最近产生的大文件（模型权重）："
          find /home/runner/ -type f -size +10M -mmin -10 2>/dev/null | while read -r file; do
              echo "🎯 抓到目标大文件: $file (大小: $(du -sh "$file" | cut -f1))"
              # 把它复制到我们的打包目录里
              cp "$file" ${{ github.workspace }}/real_model_out/
          done

          # 3. 如果没找到大于10M的文件，就把可能含有配置/权重的整个隐藏缓存区都抄底打包
          if [ -d "$HOME/.cache/roboflow" ]; then
              cp -r $HOME/.cache/roboflow/* ${{ github.workspace }}/real_model_out/ 2>/dev/null || true
          fi
          if [ -d "$HOME/.cache/inference" ]; then
              cp -r $HOME/.cache/inference/* ${{ github.workspace }}/real_model_out/ 2>/dev/null || true
          fi

      # 第三步：对真正搜刮出来的目录进行整体压缩
      - name: Compress Real Model Folder
        run: |
          echo "🔍 检查最终搜刮到的文件列表："
          ls -lh ${{ github.workspace }}/real_model_out
          
          echo "📦 正在打包..."
          tar -cvf model_output.tar -C ${{ github.workspace }} real_model_out
          xz -T0 -9e model_output.tar
          
          echo "📦 最终准备上传的压缩包实际大小："
          ls -lh model_output.tar.xz

      # 4. 📡 安装强大的网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 5. 🔑 注入网盘钥匙
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 6. 📂 在 Google Drive 上创建备份目录
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 7. 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          rclone copy \
            model_output.tar.xz \
            feadxus-Google-Drive:/backup/

      # 8. 🏁 终审盘点
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
