name: Free Up Disk Space & Fetch Roboflow Model

on:
  workflow_dispatch: # 支持手动一键触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 第一步：安装 Python 环境和 Roboflow 的推理工具
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Roboflow Inference
        run: |
          pip install inference pillow requests

      # 第二步：创建专属缓存目录并用 Python 动态获取真实 ID 后拉取模型权重
      - name: Trigger Model Download and Cache
        run: |
          # 创建一个我们自己好控制的缓存目录
          mkdir -p ${{ github.workspace }}/roboflow_model_cache
          
          # 通过写入临时 python 脚本来运行
          cat << 'EOF' > download_model.py
          import os
          import requests
          from inference import get_model
          
          # 1. 指定下载缓存路径
          os.environ["MODEL_CACHE_DIR"] = "${{ github.workspace }}/roboflow_model_cache"
          
          workspace = "trainojt-cefvy"
          project_name = "thermal-point"
          api_key = "aVmJSznSNAgC4M05gyJf"
          
          # 🌟 重新发起精准侦察
          探测_url = f"https://api.roboflow.com/{workspace}/{project_name}?api_key={api_key}"
          print("📡 正在向 Roboflow 侦察该项目的真实后台 Model ID...")
          
          try:
              res = requests.get(探测_url)
              # 打印状态码，确保网络没被拦截
              print(f"🛰️ 接口状态码: {res.status_code}")
              response = res.json()
              
              target_version = None
              versions_list = response.get("project", {}).get("versions", [])
              
              # 2. 强固的类型转换判断，彻底解决 'int' 报错
              for v in versions_list:
                  v_id = str(v.get("id", ""))
                  v_num = str(v.get("version", ""))
                  
                  # 只要版本号是 2，或者 id 结尾是 /2，就是我们要的目标！
                  if v_num == "2" or v_id.endswith("/2"):
                      target_version = v_id
                      break
              
              if target_version:
                  model_id = target_version
                  print(f"🎯 侦察成功！真实的带加密后缀 model_id 是: {model_id}")
              else:
                  # 如果实在找不到 v2，直接抓第一个保底
                  model_id = versions_list[0]["id"]
                  print(f"⚠️ 列表中未找到 v2，自动使用最新版本 ID: {model_id}")
                  
          except Exception as e:
              print(f"❌ 侦察严重报错: {e}")
              print("📋 后台返回的原始 JSON 数据如下，请留存核对:")
              try:
                  print(res.text)
              except:
                  pass
              # 绝不让它瞎猜，查不到直接抛出异常中断，防止盲目下载
              raise RuntimeError("无法从 Roboflow 接口获取有效的 Model ID，停止后续运行。")
          
          print("🚀 开始在 GitHub 云端拉取 Roboflow 模型...")
          model = get_model(model_id=model_id, api_key=api_key)
          print("✅ 模型拉取成功！")
          EOF
          
          python download_model.py

      # 第三步：将缓存下来的整个模型目录压缩打包
      - name: Compress Model Folder
        run: |
          # 把下载好的模型文件夹打包成 tar.xz
          tar -cvf model_output.tar -C ${{ github.workspace }}/roboflow_model_cache .
          xz -T0 -9e model_output.tar
          echo "📦 打包压缩完成，文件名为: model_output.tar.xz"

      # 第四步：安装并配置你的 rclone 顺火轮
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        run: |
          mkdir -p ~/.config/rclone
          # 确保你的项目根目录下有预先准备好的 rclone.conf 文件
          cp rclone.conf ~/.config/rclone/

      # 第五步：将打包好的模型一键运送到你的 Google Drive 
      - name: Upload Model to Google Drive
        run: |
          # 在网盘中创建目标备份目录
          rclone mkdir fsxedx-Google-Drive:/backup/models || true
          # 复制模型压缩包到网盘
          rclone copy model_output.tar.xz fsxedx-Google-Drive:/backup/models/
          # 查看网盘里是否已经有了
          rclone lsf fsxedx-Google-Drive:/backup/models/
