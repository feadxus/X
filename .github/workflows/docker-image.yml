name: Build and Push Model to Ollama

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 安装 Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # 2. 启动后台服务
      - name: Start Ollama Service
        run: |
          ollama serve &
          sleep 5

      # 3. 下载你的 GGUF 文件 (带上你的 HF_TOKEN)
      - name: Download GGUF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ./model_dir
          curl -f -L -H "Authorization: Bearer $HF_TOKEN" \
            -o ./model_dir/flux2-klein.gguf \
            "https://huggingface.co/ponpoke/flux2-klein-9b-uncensored-text-encoder/resolve/main/flux2-klein-9b-uncensored-q4_k_m.gguf"

      # 4. 创建 Modelfile
      - name: Create Modelfile
        run: |
          cat << 'EOF' > ./Modelfile
          FROM ./model_dir/flux2-klein.gguf
          PARAMETER temperature 0.7
          EOF
          
          ollama create feadxus/flux2-klein-9b -f ./Modelfile

      # 5. 关键：在 CI 中登录 Ollama 账户
      # 💡 你需要在 GitHub Secrets 里配置 OLLAMA_EMAIL 和 OLLAMA_PASSWORD
      - name: Login to Ollama
        env:
          OLLAMA_EMAIL: ${{ secrets.OLLAMA_EMAIL }}
          OLLAMA_PASSWORD: ${{ secrets.OLLAMA_PASSWORD }}
        run: |
          # 通过非交互式方式向 Ollama 提交登录凭证
          ollama login --username "$OLLAMA_EMAIL" --password "$OLLAMA_PASSWORD"
          # 或者部分版本支持环境变量直接传递

      # 6. 推送到云端
      - name: Push to Ollama Registry
        run: |
          ollama push feadxus/flux2-klein-9b
