name: Build ALICE Categorized Package And Upload To Google Drive

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest  # 指定运行环境
    steps:
      # 🛠️ 补全系统组件:安装打包和传输所需的底层解压工具(如 xz、curl)
      - name: Install System Dependencies
        env:
          # 强行进入静默模式,防止 apt 弹出服务重启卡死虚拟机
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" gzip xz-utils curl wget

      # 📡 搬运工上岗:安装强大的网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 🔑 注入网盘钥匙:把 GitHub Secrets 里的 Google Drive 凭证写进配置文件
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FSXEDX_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 🔍 连通性测试:打印 rclone 版本并列出网盘,确保钥匙有效、网路通畅
      - name: Verify rclone
        run: |
          rclone version
          rclone listremotes

      # 🏗️ 筑基打底:生成核心主程序,并把离线包的目录骨架(pip、模型、数据集)搭好
      - name: Build ALICE Core and Layout Structures
        run: |
          mkdir -p models  # 修复权限问题:去掉根目录斜杠

      # 🎯 狙击 Argos 翻译模型:从官方源批量拉取所有的翻译权重文件
      - name: Download Argos Translate Models
        run: |
          BASE="https://argos-net.com/v1"
          FILES=(
            translate-sq_en-1_9.argosmodel translate-ar_en-1_0.argosmodel
          )
          
          for file in "${FILES[@]}"; do
            echo "正在下载: $file ..."
            while ! curl -L -C - --retry 5 --retry-delay 3 --connect-timeout 10 -o "translate_models/$file" "$BASE/$file"; do
              echo "下载中断，10秒后重试..."
              sleep 10
            done
          done

      # 🗜️ 初步打包:将刚刚准备好的整套翻译模型目录打包成一个 tar 文件
      - name: Pack Categorized Package
        run: |
          tar -cvf argos_translate_models.tar -C ./translate_models .

      # 🤐 极限压缩:调用 XZ 算法并拉满多线程(-T0),把体积榨干到极致(生成 .tar.xz)
      - name: Compress Package with XZ
        run: |
          xz -T0 -6 alice_models.tar

      # 📂 创建远程据点:去你的 Google Drive 上建一个叫 backup 的文件夹(如果不存在的话)
      - name: Create Google Drive Folder
        run: |
          rclone mkdir fsxedx-Google-Drive:/backup || true

      # 🚀 冲向云端:把压缩好的离线包稳稳地同步上传到 Google Drive 的备份目录
      - name: Upload To Google Drive
        run: |
          rclone copy \
            alice_models.tar.xz \
            fsxedx-Google-Drive:/backup/

      # 🏁 终审盘点:列出网盘里的文件,亲眼确认离线包大小和状态都完全 OK
      - name: Verify Upload
        run: |
          rclone lsf fsxedx-Google-Drive:/backup/
