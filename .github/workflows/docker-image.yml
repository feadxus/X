name: Build and Push ComfyUI VoxCPM Docker

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # ====================================================================
      # 腾出空间!通过卸载不需要的 Android、.NET 等工具,释放出约 30GB+ 空间
      # ====================================================================
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      # 📡 搬运工上岗:安装强大的网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 🔑 注入网盘钥匙:把 GitHub Secrets 里的 Google Drive 凭证写进配置文件
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 登录镜像仓库(这里以 Docker Hub 为例,换成你自己的 Secrets)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ⏬ 下载镜像 
      - name: Pull Docker Image (amd64)
        run: |
          docker pull --platform linux/amd64 feadxus/comfyui-voxcpm

      # 🗜️ 一步到位流式压缩(省磁盘、省内存)
      - name: Save and Compress Docker Image
        run: |
          # 使用 -3 或 -4 压缩率，兼顾大小与内存，防止 GitHub 内存崩溃
          docker save feadxus/comfyui-voxcpm | xz -T0 -3 > images.tar.xz

      # 📂 创建远程据点
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          rclone copy \
            images.tar.xz \
            feadxus-Google-Drive:/backup/

      # 🏁 终审盘点
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
