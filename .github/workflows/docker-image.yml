name: Build and Push Flux2-Klein to Ollama

on:
  workflow_dispatch:

jobs:
  build-and-push-ollama:
    runs-on: ubuntu-latest
    steps:
      # 1. 📥 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 🦙 安装官方 Ollama 环境
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # 3. ⏬ 携带鉴权下载你指定的 GGUF 模型文件
      # 💡 老师帮你改了这里：加入了 HF_TOKEN 鉴权，并精确定位到了 Q4_K_M 版本的 GGUF 链接
      - name: Download GGUF from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ./model_dir
          echo "📥 开始下载..."
          curl -L \
          -H "Authorization: Bearer $HF_TOKEN" \
          -o ./model_dir/flux2-klein-9b-uncensored-q4_k_m.gguf \
          "https://huggingface.co/ponpoke/flux2-klein-9b-uncensored-text-encoder/resolve/main/flux2-klein-9b-uncensored-q4_k_m.gguf"

      # 4. 📝 自动创建专属的 Modelfile 配置文件
      # 💡 老师帮你改了这里：将基础权重指向刚刚下好的特定文件名
      - name: Create Modelfile
        run: |
          cat << 'EOF' > ./Modelfile
          FROM ./model_dir/flux2-klein-9b-uncensored-q4_k_m.gguf
          
          # 你可以根据需要在此处加入特定的人设或参数限制
          PARAMETER temperature 0.7
          PARAMETER stop "<|im_end|>"
          EOF

      # 5. 🏗️ 在后台启动 Ollama 服务并开始本地编译
      # 💡 老师帮你改了这里：模型名称修改为更贴切的 flux2-klein-9b
      - name: Build Local Ollama Model
        env:
          OLLAMA_USERNAME: ${{ secrets.OLLAMA_USERNAME }}
        run: |
          ollama serve &
          sleep 5
          
          echo "🏗️ 正在将 GGUF 文件导入并编译为 Ollama 内部模型..."
          ollama create ${OLLAMA_USERNAME}/flux2-klein-9b -f ./Modelfile

      # 6. 🚀 一键冲向云端 Ollama 官方仓库
      - name: Push Model to Ollama Registry
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_USERNAME: ${{ secrets.OLLAMA_USERNAME }}
        run: |
          echo "🚀 开始推送到你的 Ollama 社区账户..."
          ollama push ${OLLAMA_USERNAME}/flux2-klein-9b
          echo "🏁 推送成功！"
