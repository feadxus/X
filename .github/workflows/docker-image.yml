name: Build and Push Flux2-Klein to Ollama

on:
  workflow_dispatch:

jobs:
  build-and-push-ollama:
    runs-on: ubuntu-latest
    steps:
      # 1. 📥 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 🦙 安装官方 Ollama 环境 (已修复为正确的 install.sh 脚本地址)
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # 3. ⏬ 携带鉴权克隆整个 Hugging Face 模型仓库（包含 GGUF 和所有配置文件）
      - name: Clone Hugging Face Repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📥 开始完整克隆 Hugging Face 仓库..."
          # 配置 git 允许通过 token 认证克隆私有/受限仓库
          git clone https://x-access-token:${HF_TOKEN}@huggingface.co/ponpoke/flux2-klein-9b-uncensored-text-encoder ./model_dir
          
          # 检查目录下的文件
          echo "📊 检查下载的文件列表："
          ls -lh ./model_dir

      # 4. 📝 自动创建专属的 Modelfile 配置文件
      - name: Create Modelfile
        run: |
          cat << 'EOF' > ./Modelfile
          FROM ./model_dir/flux2-klein-9b-uncensored-q4_k_m.gguf
          
          PARAMETER temperature 0.7
          PARAMETER stop "<|im_end|>"
          EOF

      # 5. 🏗️ 在后台启动 Ollama 服务并开始本地编译
      - name: Build Local Ollama Model
        run: |
          ollama serve &
          sleep 5
          
          echo "🏗️ 正在将 GGUF 文件导入并编译为 Ollama 内部模型..."
          ollama create feadxus/flux2-klein-9b -f ./Modelfile

      # 6. 🚀 一键冲向云端 Ollama 官方仓库
      - name: Push Model to Ollama Registry
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          echo "🚀 开始推送到你的 Ollama 社区账户..."
          ollama push feadxus/flux2-klein-9b
          echo "🏁 推送成功！"
