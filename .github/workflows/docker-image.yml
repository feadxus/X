name: Free Up Disk Space & Fetch Roboflow Model

on:
  workflow_dispatch: # 支持手动一键触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 第一步：直接动态向 Roboflow 索要真实下载直链，并拉取真正的 ZIP 压缩包
      - name: Dynamic Extract And Download ZIP
        run: |
          echo "📡 正在向 Roboflow 索要真实的下载直链..."
          
          # 核心参数定义
          WORKSPACE="trainojt-cefvy"
          PROJECT="thermal-point"
          VERSION="2"
          API_KEY="aVmJSznSNAgC4M05gyJf"
          
          # 请求 API 矩阵
          API_URL="https://api.roboflow.com/${WORKSPACE}/${PROJECT}/${VERSION}/yolov8?api_key=${API_KEY}"
          
          # 动态捕获真实的下载链接（通过 jq 解析接口返回的 export.link）
          REAL_DOWNLOAD_LINK=$(curl -s "$API_URL" | jq -r '.export.link')
          
          if [ "$REAL_DOWNLOAD_LINK" == "null" ] || [ -z "$REAL_DOWNLOAD_LINK" ]; then
              echo "❌ 提取失败！未能从响应中解析到有效 link，请检查 API KEY 或项目权限。"
              exit 1
          fi
          
          echo "🎯 成功捕获真实直链: $REAL_DOWNLOAD_LINK"
          echo "🚀 开始顺藤摸瓜全力拉取真实模型数据集..."
          
          # 用真正的直链去下载文件
          curl -L -f "$REAL_DOWNLOAD_LINK" -o "roboflow_export.zip"
          
          echo "✅ 资源落盘成功！盘点原始 ZIP 包实际大小："
          ls -lh roboflow_export.zip

      # 第二步：解压（强制覆盖不弹窗）并转化为标准高压缩 tar.xz 格式
      - name: Re-compress Folder
        run: |
          echo "📦 正在解压并转化为 tar.xz 格式..."
          mkdir -p roboflow_unzipped
          
          # 🌟【精准修复】：加上 -o 参数，遇到同名文件直接强制覆盖，绝不弹窗卡死
          unzip -o -q roboflow_export.zip -d roboflow_unzipped/
          
          # 打印一下解压出来的文件结构，确保里面有货
          echo "📂 解压后的目录结构盘点："
          ls -R roboflow_unzipped
          
          # 重新整体打包成你的标准备份包
          tar -cvf model_output.tar -C ${{ github.workspace }} roboflow_unzipped
          xz -T0 -9e model_output.tar
          
          echo "📦 最终准备上传的压缩包实际大小："
          ls -lh model_output.tar.xz

      # 第三步：📡 搬运工上岗：安装强大的网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 第四步：🔑 注入网盘钥匙：把 GitHub Secrets 里的 Google Drive 凭证写进配置文件
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 第五步：📂 创建远程据点：去你的 Google Drive 上建一个叫 backup 的文件夹
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 第六步：🚀 冲向云端：把压缩好的离线包稳稳地同步上传到 Google Drive 的备份目录
      - name: Upload To Google Drive
        run: |
          rclone copy \
            model_output.tar.xz \
            feadxus-Google-Drive:/backup/

      # 第七步：🏁 终审盘点：列出网盘里的文件，亲眼确认离线包大小和状态都完全 OK
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
