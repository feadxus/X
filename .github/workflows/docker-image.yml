name: Free Download DroneMapper Data to Google Drive

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      # ====================================================================
      # 腾出空间! 清理不需要的系统残留，为大文件下载和压缩留出充足的硬空间
      # ====================================================================
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      # 📡 安装网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org | sudo bash

      # 🔑 注入网盘钥匙: 把 Google Drive 凭证写入 rclone 配置文件
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # ⏬ 核心步骤：直接从 DroneMapper 的公开非 S3 镜像源免费拖取
      - name: Download from Public Mirror (No AWS Needed)
        run: |
          echo "正在通过公开镜像源下载 MicaSense 示例数据..."
          # 使用 wget 加上断点续传和自动重试，确保 3GB 文件在 GitHub 骨干网上稳妥下载
          wget -c --tries=10 --retry-connrefused \
            "https://dronemapper.com" \
            -O ./RGBNET-MicaSense.zip

      # 🗜️ 强力解压并用 XZ 进行高比例流式打包
      - name: Decompress and Re-compress to XZ
        run: |
          echo "正在解压原始 Zip..."
          mkdir ./extracted_data
          unzip -q RGBNET-MicaSense.zip -d ./extracted_data
          
          echo "正在以高压缩比流式打包为 .tar.xz..."
          tar -cf - -C ./extracted_data . | xz -T0 -3 > RGBNET-MicaSense.tar.xz
          
          # 随手清理，防止撑爆 GitHub 虚拟机的磁盘
          rm -rf ./extracted_data
          rm -f RGBNET-MicaSense.zip

      # 📂 创建网盘远程备份据点
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          rclone copy \
            RGBNET-MicaSense.tar.xz \
            feadxus-Google-Drive:/backup/

      # 🏁 终审盘点
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
