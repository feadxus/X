" "yolo26n.onnx" "yolo26n.pt" "yolo26s-cls.onnx" "yolo26s-cls.pt" "yolo26s-depth.pt" "yolo26s-distill.pt" "yolo26s-obb.onnx" "yolo26s-obb.pt" "yolo26s-objv1-150.pt" "yolo26s-objv1-seg.pt" "yolo26s-pose.onnx" "yolo26s-pose.pt" "yolo26s-reid-market.pt" "yolo26s-reid.onnx" "yolo26s-reid.pt" "yolo26s-s3d.pt" "yolo26s-seg.onnx" "yolo26s-seg.pt" "yolo26s-sem-ade20k.pt" "yolo26s-sem.onnx" "yolo26s-sem.pt" "yolo26s-stereo3ddet-siamese.pt" "yolo26s.onnx" "yolo26s.pt" "yolo26x-cls.onnx" "yolo26x-cls.pt" "yolo26x-depth.pt" "yolo26x-distill.pt" "yolo26x-obb.onnx" "yolo26x-obb.pt" "yolo26x-objv1-150.pt" "yolo26x-objv1-seg.pt" "yolo26x-pose.onnx")
          #MODELS=("yolo26x-pose.pt" "yolo26x-reid-market.pt" "yolo26x-reid.onnx" "yolo26x-reid.pt" "yolo26x-seg.onnx" "yolo26x-seg.pt" "yolo26x-sem-ade20k.pt" "yolo26x-sem.onnx" "yolo26x-sem.pt" "yolo26x.onnx" "yolo26x.pt" "yoloe-11l-seg-pf.pt" "yoloe-11l-seg.pt" "yoloe-11m-seg-pf.pt" "yoloe-11m-seg.pt" "yoloe-11s-seg-pf.pt" "yoloe-11s-seg.pt" "yoloe-26l-seg-pf.pt" "yoloe-26l-seg.pt" "yoloe-26m-seg-pf.pt" "yoloe-26m-seg.pt" "yoloe-26n-seg-pf.pt" "yoloe-26n-seg.pt" "yoloe-26s-seg-pf.pt" "yoloe-26s-seg.pt" "yoloe-26x-seg-pf.pt" "yoloe-26x-seg.pt" "yoloe-v8l-seg-pf.pt" "yoloe-v8l-seg.pt" "yoloe-v8m-seg-pf.pt" "yoloe-v8m-seg.pt" "yoloe-v8s-seg-pf.pt" "yoloe-v8s-seg.pt" "yolov10b.pt" "yolov10l.pt" "yolov10m.pt" "yolov10n.pt" "yolov10s.pt" "yolov10x.pt" "yolov3-sppu.pt" "yolov3-tinyu.pt" "yolov3u.pt" "yolov5l6u.pt" "yolov5lu.pt" "yolov5m6u.pt" "yolov5mu.pt" "yolov5n6u.pt" "yolov5nu.pt" "yolov5s6u.pt" "yolov5su.pt" "yolov5x6u.pt" "yolov5xu.pt" "yolov8l-cls.onnx" "yolov8l-cls.pt" "yolov8l-human.pt" "yolov8l-obb.onnx" "yolov8l-obb.pt" "yolov8l-oiv7.pt" "yolov8l-pose.onnx" "yolov8l-pose.pt" "yolov8l-seg.onnx" "yolov8l-seg.pt" "yolov8l-world-cc3m.pt" "yolov8l-world.pt" "yolov8l-worldv2-cc3m.pt" "yolov8l-worldv2.pt" "yolov8l.onnx")
          #MODELS=("yolov8l.pt" "yolov8m-cls.onnx" "yolov8m-cls.pt" "yolov8m-human.pt" "yolov8m-obb.onnx" "yolov8m-obb.pt" "yolov8m-oiv7.pt" "yolov8m-pose.onnx" "yolov8m-pose.pt" "yolov8m-seg.onnx" "yolov8m-seg.pt" "yolov8m-world.pt" "yolov8m-worldv2.pt" "yolov8m.onnx" "yolov8m.pt" "yolov8n-cls.onnx" "yolov8n-cls.pt" "yolov8n-human.pt" "yolov8n-obb.onnx" "yolov8n-obb.pt" "yolov8n-oiv7.pt" "yolov8n-pose.onnx" "yolov8n-pose.pt" "yolov8n-seg.onnx" "yolov8n-seg.pt" "yolov8n.onnx" "yolov8n.pt" "yolov8s-cls.onnx" "yolov8s-cls.pt" "yolov8s-human.pt" "yolov8s-obb.onnx" "yolov8s-obb.pt" "yolov8s-oiv7.pt" "yolov8s-pose.onnx" "yolov8s-pose.pt" "yolov8s-seg.onnx" "mobileclip2_l14_image.ts" "mobileclip2_s4_image.ts")
          MODELS=("yolov8s-seg.pt" "yolov8s-world.pt" "yolov8s-worldv2.pt" "yolov8s.onnx" "yolov8s.pt" "yolov8x-cls.onnx" "yolov8x-cls.pt" "yolov8x-obb.onnx" "yolov8x-obb.pt" "yolov8x-oiv7.pt" "yolov8x-pose-p6.pt" "yolov8x-pose.onnx" "yolov8x-pose.pt" "yolov8x-seg.onnx" "yolov8x-seg.pt" "yolov8x-world.pt" "yolov8x-worldv2.pt" "yolov8x.onnx" "yolov8x.pt" "yolov9c-seg.pt" "yolov9c.pt" "yolov9e-seg.pt" "yolov9e.pt" "yolov9m.pt" "yolov9s.pt" "yolov9t.pt" "yolo_nas_l.pt" "yolo_nas_m.pt" "yolo11l-cls.onnx" "yolo11l-cls.pt" "yolo11l-obb.onnx" "yolo11l-obb.pt" "yolo11l-pose.onnx" "yolo11l-pose.pt" "yolo11l-seg.onnx" "yolo11l-seg.pt" "yolo11l.onnx" "yolo11l.pt" "yolo11m-cls.onnx" "yolo11m-cls.pt" "yolo11m-obb.onnx" "yolo11m-obb.pt")

          for model in "${MODELS[@]}"; do
            wget -q -O "models/$model" "https://github.com/ultralytics/assets/releases/download/v8.4.0/$model"
          done

      # 🗜️ 初步打包:将刚刚准备好的整套 release 目录打包成一个 tar 文件
      - name: Pack Categorized Package
        run: |
          tar -cvf alice_models4.tar -C ./models .  # 移除未定义的 matrix 变量

      # 🤐 极限压缩:调用 XZ 算法并拉满多线程(-T0),把体积榨干到极致(生成 .tar.xz)
      - name: Compress Package with XZ
        run: |
          xz -T0 -6 alice_models4.tar

      # 📂 创建远程据点:去你的 Google Drive 上建一个叫 backup 的文件夹(如果不存在的话)
      - name: Create Google Drive Folder
        run: |
          rclone mkdir fsxedx-Google-Drive:/backup || true

      # 🚀 冲向云端:把压缩好的离线包稳稳地同步上传到 Google Drive 的备份目录
      - name: Upload To Google Drive
        run: |
          rclone copy \
            alice_models4.tar.xz \
            fsxedx-Google-Drive:/backup/

      # 🏁 终审盘点:列出网盘里的文件,亲眼确认离线包大小和状态都完全 OK
      - name: Verify Upload
        run: |
          rclone lsf fsxedx-Google-Drive:/backup/
