name: Free Up Disk Space

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Pull gzip
        run: |
          sudo apt update
          sudo apt install -y gzip

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FSXEDX_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      - name: Debug rclone config
        run: cat ~/.config/rclone/rclone.conf

      - name: Pull Docker Image (amd64)
        run: |
          docker pull --platform linux/amd64 emqx/mqttx-web

      - name: Save Docker Image to tar
        run: |
          docker save \
            emqx/mqttx-web \
            --platform linux/amd64 -o all_images.tar
          tar -c all_images.tar | xz -T0 -9e > images.tar.xz


      - name: Upload tar to Google Drive
        run: |
          # 可选创建目录
          rclone mkdir fsxedx-Google-Drive:/backup || true
          # 上传 tar 文件
          rclone copy images.tar.xz fsxedx-Google-Drive:/backup/
          # 查看上传结果
          rclone lsf fsxedx-Google-Drive:/backup/
