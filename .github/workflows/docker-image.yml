name: Build and Push Flux2-Klein to Ollama

on:
  workflow_dispatch:

jobs:
  build-and-push-ollama:
    runs-on: ubuntu-latest
    steps:
      # 1. 📥 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 🦙 安装官方 Ollama 环境 (已修复为正确的 install.sh 脚本地址)
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # 3. ⏬ 携带鉴权下载你指定的 GGUF 模型文件，并验证是否下载成功
      - name: Download GGUF from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ./model_dir
          echo "📥 开始下载 flux2-klein-9b-uncensored-q4_k_m.gguf..."
          
          # 使用 -f 参数：如果 HTTP 状态码 >= 400（如 404 或 401），curl 会直接报错退出，不会把错误网页存成文件
          curl -f -L -H "Authorization: Bearer $HF_TOKEN" \
            -o ./model_dir/flux2-klein.gguf \
            "https://huggingface.co/ponpoke/flux2-klein-9b-uncensored-text-encoder/resolve/main/flux2-klein-9b-uncensored-q4_k_m.gguf"
            
          # 检查文件大小，防止下载下来的是个几十字节的错误 HTML 页面
          echo "📊 检查下载的文件大小："
          ls -lh ./model_dir/flux2-klein.gguf
      # 4. 📝 自动创建专属的 Modelfile 配置文件
      - name: Create Modelfile
        run: |
          cat << 'EOF' > ./Modelfile
          FROM ./model_dir/flux2-klein.gguf
          
          # 你可以根据需要在此处加入特定的人设或参数限制
          PARAMETER temperature 0.7
          PARAMETER stop "<|im_end|>"
          EOF

      # 5. 🏗️ 在后台启动 Ollama 服务并开始本地编译
      - name: Build Local Ollama Model
        run: |
          ollama serve &
          sleep 5
          
          echo "🏗️ 正在将 GGUF 文件导入并编译为 Ollama 内部模型..."
          ollama create feadxus/flux2-klein-9b -f ./Modelfile

      # 6. 🚀 一键冲向云端 Ollama 官方仓库
      - name: Push Model to Ollama Registry
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          echo "🚀 开始推送到你的 Ollama 社区账户..."
          ollama push feadxus/flux2-klein-9b
          echo "🏁 推送成功！"
