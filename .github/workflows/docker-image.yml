name: Free Up Disk Space & Fetch My Own Model

on:
  workflow_dispatch: # 支持手动一键触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 既然要调用自建模型，我们需要装回推理环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Roboflow Inference
        run: |
          pip install inference pillow requests

      # 2. 模拟运行：通过给它一张图强制它把几百兆的模型权重完全拉到 GitHub 云端
      - name: Force Download Model via Mock Inference
        env:
          # 锁死缓存下载路径到我们能打包的地方
          MODEL_CACHE_DIR: ${{ github.workspace }}/roboflow_model_cache
        run: |
          echo "📡 正在初始化本地缓存目录..."
          mkdir -p $MODEL_CACHE_DIR
          
          cat << 'EOF' > run_mock_inference.py
          import os
          from inference import get_model
          from PIL import Image
          import requests
          
          # 你的专属配置（根据你的截图填入）
          # 注意：请把下面的 ID 完整补充为你截图中左边那个完整的 ID
          model_id = "thermal-3nyja-oytjd-1-rfdetr-large-t1" 
          api_key = "aVmJSznSNAgC4M05gyJf"
          
          print(f"🚀 正在强制拉取并加载属于你的模型: {model_id} ...")
          try:
              # 这一步会强制触发官方去拉取真正的权重组件
              model = get_model(model_id=model_id, api_key=api_key)
              
              print("🖼️ 正在生成一张空白测试图，用来假装进行一次推理...")
              # 生成一张 640x640 的纯黑图片喂给它，迫使它完成模型初始化的全过程
              mock_image = Image.new("RGB", (640, 640), (0, 0, 0))
              
              print("🧠 开始本地 Mock 推理（这会彻底激活并固化缓存）...")
              results = model.infer(mock_image)
              print("✅ 模拟推理圆满成功！")
              
          except Exception as e:
              print(f"❌ 触发下载失败，报错原因: {e}")
              raise e
          EOF
          
          python run_mock_inference.py

      # 3. 检查并极限压缩真正的模型缓存
      - name: Compress Model Cache Folder
        run: |
          echo "🔍 正在盘点本次强制拉取下来的真实文件总量..."
          ls -R ${{ github.workspace }}/roboflow_model_cache
          
          echo "📦 正在打包成 tar.xz 极限压缩格式..."
          tar -cvf model_output.tar -C ${{ github.workspace }} roboflow_model_cache
          xz -T0 -9e model_output.tar
          
          echo "📦 最终准备上传的压缩包实际大小："
          ls -lh model_output.tar.xz

      # 4. 📡 安装强大的网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 5. 🔑 注入网盘钥匙
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 6. 📂 在 Google Drive 上创建备份目录
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 7. 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          rclone copy \
            model_output.tar.xz \
            feadxus-Google-Drive:/backup/

      # 8. 🏁 终审盘点
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
