name: Free Up Disk Space & Fetch My Own Model

on:
  workflow_dispatch: # 支持手动一键触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 既然要调用自建模型，我们需要装回推理环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Roboflow Inference
        run: |
          pip install inference pillow requests

      # 第二步：强行下载模型，并精准锁定真正的 HTTP 缓存
      - name: Force Download & Precise Cache Backup
        run: |
          echo "📡 正在启动 Mock 推理..."
          
          cat << 'EOF' > run_mock_inference.py
          import os
          from inference import get_model
          from PIL import Image
          
          model_id = "thermal-dataset-tfoku-nvsac/1" 
          api_key = "aVmJSznSNAgC4M05gyJf"
          
          print(f"🚀 开始拉取模型: {model_id} ...")
          try:
              model = get_model(model_id=model_id, api_key=api_key)
              mock_image = Image.new("RGB", (640, 640), (0, 0, 0))
              results = model.infer(mock_image)
              print("✅ 模拟推理圆满成功！")
          except Exception as e:
              print(f"❌ 运行失败: {e}")
              raise e
          EOF
          
          # 运行下载，生成核心 pip 缓存
          python run_mock_inference.py
          
          echo "=================================================="
          echo "🎯 正在对精准锁定的 pip 核心网络缓存进行提取归档..."
          echo "=================================================="
          
          # 创建一个完全干净的临时隔离区，用于维持原有的目录结构
          mkdir -p ${{ github.workspace }}/roboflow_offline_cache/.cache/pip/
          
          # 将整个 http-v2 缓存原封不动抄底复制过去（保护好哈希索引）
          if [ -d "$HOME/.cache/pip/http-v2" ]; then
              cp -r "$HOME/.cache/pip/http-v2" ${{ github.workspace }}/roboflow_offline_cache/.cache/pip/
              echo "✅ 成功精准捕获 19M + 57M 核心模型体及配套网络索引！"
          else
              echo "❌ 警告：未找到预期的 http-v2 目录！"
              exit 1
          fi

      # 第三步：进行超高压缩，并输出报告
      - name: Compress Target Model Cache
        run: |
          echo "🔍 验证即将打包的隔离区结构与大小："
          du -sh ${{ github.workspace }}/roboflow_offline_cache
          find ${{ github.workspace }}/roboflow_offline_cache -type f -name "*.body" -exec ls -lh {} \;
          
          echo "📦 正在使用极限模式打包 (model_output.tar.xz)..."
          tar -cvf model_output.tar -C ${{ github.workspace }}/roboflow_offline_cache .
          xz -T0 -9e model_output.tar
          
          echo "🎉 最终交付压缩包实际大小："
          ls -lh model_output.tar.xz

      # 4. 📡 安装强大的网盘传输工具 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 5. 🔑 注入网盘钥匙
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 6. 📂 在 Google Drive 上创建备份目录
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 7. 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          rclone copy \
            model_output.tar.xz \
            feadxus-Google-Drive:/backup/

      # 8. 🏁 终审盘点
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
