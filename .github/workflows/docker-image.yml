name: Free Download MicaSense Official Data to Google Drive

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      # ====================================================================
      # 腾出空间! 清理不需要的系统残留，为大文件下载和压缩留出充足的硬空间
      # ====================================================================
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      # 📡 搬运工上岗: 使用 Ubuntu 自带包管理器一键安装 rclone
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      # 🔑 注入网盘钥匙: 把 Google Drive 凭证写入 rclone 配置文件
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FEADXUS_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # ⏬ 核心步骤：直接从 MicaSense 官方公开样本站拉取真正的 5 波段原始数据
      - name: Download from MicaSense Public Sample Server
        run: |
          echo "正在下载 MicaSense 官方提供的 RedEdge 原始测试数据集..."
          # 使用 wget -nv 保持日志清爽，若服务器返回错误则自动中止
          wget -nv -c --tries=10 --retry-connrefused \
            "https://micasense.com" \
            -O ./rededge_raw_example1.zip

      # 🗜️ 强力解压并用 XZ 进行高比例流式打包
      - name: Decompress and Re-compress to XZ
        run: |
          echo "正在确认文件格式并开始解压原始 Zip..."
          mkdir ./extracted_data
          unzip -q rededge_raw_example1.zip -d ./extracted_data
          
          echo "正在以高压缩比流式打包为 .tar.xz..."
          tar -cf - -C ./extracted_data . | xz -T0 -3 > rededge_raw_example1.tar.xz
          
          # 随手清理，防止撑爆 GitHub 虚拟机的磁盘
          rm -rf ./extracted_data
          rm -f rededge_raw_example1.zip

      # 📂 创建网盘远程备份据点
      - name: Create Google Drive Folder
        run: |
          rclone mkdir feadxus-Google-Drive:/backup || true

      # 🚀 冲向云端
      - name: Upload To Google Drive
        run: |
          rclone copy \
            rededge_raw_example1.tar.xz \
            feadxus-Google-Drive:/backup/

      # 🏁 终审盘点
      - name: Verify Upload
        run: |
          rclone lsf feadxus-Google-Drive:/backup/
